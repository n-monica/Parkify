<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parkify | Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0fdf4;
    }

    .login-box {
      display: flex;
      width: 900px;
      min-height: 540px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12);
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      flex: 1;
      background: linear-gradient(160deg, #bbf7d0 0%, #86efac 40%, #4ade80 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 44px 40px 0 40px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 320px; height: 320px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
    }
    .left-panel::after {
      content: '';
      position: absolute;
      bottom: 80px; left: -80px;
      width: 250px; height: 250px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
    }

    .left-top { position: relative; z-index: 2; }

    .logo-row {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 32px;
    }

    .p-circle {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid #16a34a;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .p-letter {
      font-family: 'Nunito', sans-serif;
      font-size: 32px; font-weight: 800;
      color: #1a1a1a; line-height: 1;
    }

    .brand-name {
      font-family: 'Nunito', sans-serif;
      font-size: 28px; font-weight: 800;
      color: #14532d; letter-spacing: -0.5px;
    }
    .brand-name span { color: #166534; }

    .left-heading {
      font-family: 'Nunito', sans-serif;
      font-size: 34px; font-weight: 800;
      color: #14532d; line-height: 1.2;
      margin-bottom: 12px; letter-spacing: -0.5px;
    }
    .left-heading span { color: #166534; }

    .left-sub {
      font-size: 13px;
      color: #166534;
      line-height: 1.7; max-width: 300px;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 30px;
      padding: 7px 14px;
      font-size: 12px; color: #14532d;
      font-weight: 600;
      backdrop-filter: blur(8px);
      margin-bottom: 10px;
      animation: badgeFloat 5s ease-in-out infinite;
    }
    .badge:nth-child(2) { animation-delay: -2s; }
    .badge:nth-child(3) { animation-delay: -4s; }

    @keyframes badgeFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .city-scene { position: relative; z-index: 2; margin-top: auto; }

    /* ── RIGHT PANEL ── */
    .right-panel {
      width: 400px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 44px;
    }

    .form-title {
      font-family: 'Nunito', sans-serif;
      font-size: 26px; font-weight: 800;
      color: #1a1a2e; margin-bottom: 6px;
    }

    .form-subtitle {
      font-size: 13px; color: #9ca3af;
      margin-bottom: 36px;
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block; font-size: 13px;
      font-weight: 600; color: #374151;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .input-wrap input {
      width: 100%;
      padding: 13px 18px 13px 46px;
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      color: #1a1a2e; font-size: 14px;
      font-family: 'Poppins', sans-serif;
      outline: none; transition: all 0.25s ease;
    }
    .input-wrap input::placeholder { color: #c4c9d4; }
    .input-wrap input:focus {
      border-color: #16a34a;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
    }

    .input-icon {
      position: absolute; left: 15px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
    }

    .form-options {
      display: flex; align-items: center;
      margin-bottom: 28px;
    }

    .remember-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #6b7280; cursor: pointer;
    }
    .remember-label input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: #16a34a; cursor: pointer;
    }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      border: none; border-radius: 30px;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(22,163,74,0.35);
      margin-bottom: 24px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(22,163,74,0.45);
    }

    .divider { height: 1px; background: #f3f4f6; margin-bottom: 20px; }
    .hint-text { font-size: 12px; color: #9ca3af; text-align: center; }
    .hint-text strong { color: #16a34a; }

    @media (max-width: 768px) {
      .login-box { flex-direction: column; width: 95%; }
      .left-panel { padding: 36px 28px 0; }
      .right-panel { width: 100%; padding: 36px 28px; }
    }
  </style>
</head>
<body>

<div class="login-box">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="left-top">
      <div class="logo-row">
        <div class="p-circle"><div class="p-letter">P</div></div>
        <div class="brand-name">Park<span>ify</span></div>
      </div>

      <div class="left-heading">Smart Parking<br>for <span>Smart Cities</span></div>
      <p class="left-sub">Manage parking locations, monitor slot availability and track bookings from one dashboard.</p>

      <div class="badge">🅿️ &nbsp;12 Active Locations</div><br>
      <div class="badge">✅ &nbsp;342 Bookings Today</div><br>
      <div class="badge">🚗 &nbsp;1,250+ Slots Managed</div>
    </div>

    <!-- City SVG Scene -->
    <div class="city-scene">
      <svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg" width="100%">
        <defs>
          <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
            <stop offset="100%" stop-color="#16a34a" stop-opacity="0.6"/>
          </linearGradient>
        </defs>
        <rect x="10" y="50" width="45" height="110" fill="rgba(255,255,255,0.25)" rx="3"/>
        <rect x="20" y="35" width="25" height="25" fill="rgba(255,255,255,0.3)" rx="2"/>
        <rect x="65" y="70" width="38" height="90" fill="rgba(255,255,255,0.2)" rx="3"/>
        <rect x="115" y="30" width="55" height="130" fill="rgba(255,255,255,0.25)" rx="3"/>
        <rect x="130" y="15" width="25" height="25" fill="rgba(255,255,255,0.3)" rx="2"/>
        <rect x="180" y="55" width="42" height="105" fill="rgba(255,255,255,0.2)" rx="3"/>
        <rect x="235" y="25" width="60" height="135" fill="rgba(255,255,255,0.25)" rx="3"/>
        <rect x="250" y="10" width="30" height="22" fill="rgba(255,255,255,0.3)" rx="2"/>
        <rect x="310" y="60" width="45" height="100" fill="rgba(255,255,255,0.2)" rx="3"/>
        <rect x="368" y="40" width="52" height="120" fill="rgba(255,255,255,0.25)" rx="3"/>
        <rect x="430" y="65" width="60" height="95" fill="rgba(255,255,255,0.2)" rx="3"/>
        <!-- Windows -->
        <rect x="22" y="60" width="7" height="7" fill="rgba(22,163,74,0.5)" rx="1"/>
        <rect x="35" y="60" width="7" height="7" fill="rgba(22,163,74,0.3)" rx="1"/>
        <rect x="120" y="45" width="8" height="8" fill="rgba(22,163,74,0.5)" rx="1"/>
        <rect x="242" y="38" width="8" height="8" fill="rgba(22,163,74,0.4)" rx="1"/>
        <rect x="375" y="55" width="8" height="8" fill="rgba(22,163,74,0.4)" rx="1"/>
        <!-- Road -->
        <rect x="0" y="145" width="500" height="15" fill="rgba(0,0,0,0.1)"/>
        <rect x="30" y="150" width="50" height="4" fill="rgba(255,255,255,0.5)" rx="2"/>
        <rect x="130" y="150" width="50" height="4" fill="rgba(255,255,255,0.5)" rx="2"/>
        <rect x="230" y="150" width="50" height="4" fill="rgba(255,255,255,0.5)" rx="2"/>
        <rect x="330" y="150" width="50" height="4" fill="rgba(255,255,255,0.5)" rx="2"/>
        <rect x="430" y="150" width="50" height="4" fill="rgba(255,255,255,0.5)" rx="2"/>
        <rect x="0" y="0" width="500" height="160" fill="url(#fade)"/>
      </svg>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="form-title">Login</div>
    <div class="form-subtitle">Get access to your Admin Dashboard</div>

    <form action="dashboard.html">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" placeholder="Enter username" value="admin">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" placeholder="••••••••" value="admin123">
        </div>
      </div>

      <div class="form-options">
        <label class="remember-label">
          <input type="checkbox" checked> Remember me
        </label>
      </div>

      <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="divider"></div>
    <div class="hint-text">Demo: <strong>admin</strong> / <strong>admin123</strong></div>
  </div>

</div>

</body>
</html>
